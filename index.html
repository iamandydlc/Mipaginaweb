<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Andy De La Cruz | Próximamente</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;

background-image:url("./promo.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;

height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

.overlay{
background:rgba(0,0,0,0.55);
padding:40px;
border-radius:20px;
max-width:500px;
}

h1{
font-size:40px;
letter-spacing:2px;
margin-bottom:10px;
}

.coming{
font-size:26px;
margin-top:10px;
animation:blink 1.5s infinite;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0.4;}
100%{opacity:1;}
}

.arrows{
font-size:28px;
margin:15px 0;
animation:mover 1s infinite alternate;
}

@keyframes mover{
from{transform:translateX(-10px);}
to{transform:translateX(10px);}
}

.form{
margin-top:20px;
}

input{
padding:12px;
margin:6px;
border:none;
border-radius:8px;
width:200px;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:white;
color:black;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

.success{
display:none;
margin-top:15px;
font-size:18px;
}

</style>

</head>

<body>

<div class="overlay">

<h1>Andy De La Cruz</h1>

<div class="coming">
PRÓXIMAMENTE… 🚀  
<br>
COMING SOON… 👀
</div>

<div class="arrows">
➡️ ➡️ ➡️
</div>

<div class="form">

<input type="text" id="user" placeholder="Crear usuario">

<br>

<input type="password" id="pass" placeholder="Crear contraseña">

<br><br>

<button onclick="crear()">Enterarme de novedades</button>

</div>

<div class="success" id="ok">
✅ Usuario creado.  
Pronto recibirás novedades exclusivas.
</div>

</div>

<script>

function crear(){

let usuario=document.getElementById("user").value;
let pass=document.getElementById("pass").value;

if(usuario!=="" && pass!==""){

document.getElementById("ok").style.display="block";

}

}

</script>

</body>
</html>
