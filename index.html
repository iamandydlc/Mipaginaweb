<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Andy De La Cruz | Próximamente</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background-image:url("./promo.jpg");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  background-attachment:fixed;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  text-align:center;
}

.overlay{
  background:rgba(0,0,0,0.55);
  padding:40px;
  border-radius:20px;
  max-width:600px;
}

h1{
  font-size:40px;
  letter-spacing:2px;
  margin-bottom:10px;
}

.coming{
  font-size:26px;
  margin-top:10px;
  animation:blink 1.5s infinite;
}

@keyframes blink{
  0%{opacity:1;}
  50%{opacity:0.4;}
  100%{opacity:1;}
}

.arrows{
  font-size:28px;
  margin:15px 0;
  animation:mover 1s infinite alternate;
}

@keyframes mover{
  from{transform:translateX(-10px);}
  to{transform:translateX(10px);}
}

.form{
  margin-top:20px;
}

input{
  padding:12px;
  margin:6px;
  border:none;
  border-radius:8px;
  width:200px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:white;
  color:black;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.1);
}

.success{
  display:none;
  margin-top:15px;
  font-size:18px;
}

/* Redes sociales burbujas */
.social{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  margin-top:30px;
}

.social a{
  text-decoration:none;
  color:white;
  font-weight:bold;
  display:flex;
  flex-direction:column;
  align-items:center;
  transition:0.4s;
}

.bubble{
  width:70px;
  height:70px;
  border-radius:50%;
  overflow:hidden;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  animation:float 3s ease-in-out infinite alternate;
  transition:0.3s;
}

.bubble img{
  width:50px;
  height:50px;
  object-fit:cover;
}

.social a:hover .bubble{
  transform:scale(1.2);
  box-shadow:0 0 15px cyan;
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
  100%{transform:translateY(0);}
}

.social span{
  margin-top:6px;
  font-size:14px;
}
</style>

</head>

<body>
<div class="overlay">

<h1>Andy De La Cruz</h1>

<div class="coming">
PRÓXIMAMENTE… 🚀<br>
COMING SOON… 👀
</div>

<div class="arrows">
➡️ ➡️ ➡️
</div>

<div class="form">
<input type="text" id="user" placeholder="Crear usuario"><br>
<input type="password" id="pass" placeholder="Crear contraseña"><br><br>
<button onclick="crear()">Enterarme de novedades</button>
</div>

<div class="success" id="ok">
✅ ¡Bienvenido a PandyLoverFamily!<br>
Ahora recibirás las nuevas noticias y novedades de Andy De La Cruz.
</div>

<!-- Redes sociales -->
<div class="social">
  <a href="https://whatsapp.com/channel/0029VbCKCOyBadmYKrAwPg3y" target="_blank">
    <div class="bubble"><img src="./whatsapp.jpg" alt="WhatsApp"></div>
    <span>WhatsApp</span>
  </a>
  <a href="https://www.facebook.com/share/1AomuuzQ6a/" target="_blank">
    <div class="bubble"><img src="./facebook.jpg" alt="Facebook"></div>
    <span>Facebook</span>
  </a>
  <a href="https://youtube.com/@iam_andydlc" target="_blank">
    <div class="bubble"><img src="./youtube.jpg" alt="YouTube"></div>
    <span>YouTube</span>
  </a>
  <a href="https://www.tiktok.com/@iam_andydlc" target="_blank">
    <div class="bubble"><img src="./tiktok.jpg" alt="TikTok"></div>
    <span>TikTok</span>
  </a>
  <a href="https://www.instagram.com/iam_andydlc" target="_blank">
    <div class="bubble"><img src="./instagram.jpg" alt="Instagram"></div>
    <span>Instagram</span>
  </a>
  <a href="https://twitch.com/iam_andydlc" target="_blank">
    <div class="bubble"><img src="./twitch.jpg" alt="Twitch"></div>
    <span>Twitch</span>
  </a>
</div>

</div>

<script>
function crear(){
  let usuario=document.getElementById("user").value;
  let pass=document.getElementById("pass").value;
  if(usuario!=="" && pass!==""){
    document.getElementById("ok").style.display="block";
  }
}
</script>

</body>
</html>
