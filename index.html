<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Campaña | Próximamente</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:url("promo.jpg") center/cover no-repeat fixed;
color:white;
text-align:center;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
backdrop-filter:brightness(60%);
}

.overlay{
background:rgba(0,0,0,0.45);
padding:40px;
border-radius:20px;
}

h1{
font-size:45px;
letter-spacing:3px;
margin-bottom:10px;
}

.coming{
font-size:28px;
animation:blink 1.5s infinite;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0.3;}
100%{opacity:1;}
}

.arrows{
font-size:30px;
margin:15px 0;
animation:move 1s infinite alternate;
}

@keyframes move{
from{transform:translateX(-10px);}
to{transform:translateX(10px);}
}

.form{
margin-top:25px;
}

input{
padding:12px;
margin:8px;
border:none;
border-radius:8px;
width:220px;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:white;
color:black;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

.success{
display:none;
margin-top:15px;
font-size:18px;
}

</style>

</head>

<body>

<div class="overlay">

<h1>Andy De La Cruz</h1>

<div class="coming">

PRÓXIMAMENTE… 🚀  
<br>
COMING SOON… 👀

</div>

<div class="arrows">
➡️➡️➡️
</div>

<div class="form">

<input type="text" id="user" placeholder="Crear usuario">

<input type="password" id="pass" placeholder="Crear contraseña">

<br>

<button onclick="crear()">Enterarme de novedades</button>

</div>

<div class="success" id="ok">

✅ Usuario creado.  
Pronto recibirás novedades exclusivas…

</div>

</div>

<script>

function crear(){

let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u!=="" && p!==""){

document.getElementById("ok").style.display="block";

}

}

</script>

</body>

</html>
